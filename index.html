<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نظام إدارة المحاماة</title>
    <!-- Bootstrap 5 RTL CSS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.rtl.min.css">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- SweetAlert2 -->
    <link href="https://cdn.jsdelivr.net/npm/sweetalert2@11.7.5/dist/sweetalert2.min.css" rel="stylesheet">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/style.css">
</head>

<body>
    <div id="app-shell" style="display: none;">
        <div class="wrapper d-flex">
            <!-- Sidebar -->
            <nav id="sidebar">
                <div class="sidebar-header d-flex align-items-center justify-content-between">
                    <h4 class="mb-0">مكتب المحاماة</h4>
                </div>

                <ul class="list-unstyled components">
                    <li class="nav-item-spa active" data-path="dashboard">
                        <a href="javascript:void(0)">
                            <i class="fas fa-home"></i> الرئيسية
                        </a>
                    </li>
                    <li class="nav-item-spa" data-path="clients">
                        <a href="javascript:void(0)">
                            <i class="fas fa-users"></i> الموكلين
                        </a>
                    </li>
                    <li class="nav-item-spa" data-path="cases">
                        <a href="javascript:void(0)">
                            <i class="fas fa-gavel"></i> القضايا
                        </a>
                    </li>
                    <li class="nav-item-spa" data-path="finances">
                        <a href="javascript:void(0)">
                            <i class="fas fa-money-bill-wave"></i> إدارة الأموال
                        </a>
                    </li>
                    <li>
                        <a href="#" id="btnLogout">
                            <i class="fas fa-sign-out-alt"></i> تسجيل الخروج
                        </a>
                    </li>
                </ul>
            </nav>

            <!-- Page Content -->
            <div id="content" class="w-100 p-4">
                <!-- Sidebar Overlay -->
                <div class="sidebar-overlay" id="sidebarOverlay"></div>

                <header
                    class="d-flex justify-content-between align-items-center mb-4 sticky-top bg-light p-3 shadow-sm rounded">
                    <div class="d-flex align-items-center gap-3">
                        <button type="button" id="sidebarCollapse" class="btn btn-primary d-md-none">
                            <i class="fas fa-bars"></i>
                        </button>
                        <h2 id="sectionTitle" class="mb-0 text-primary">الرئيسية</h2>
                    </div>
                    <div id="userInfo" class="text-muted">
                        <span id="lawyerNameShell">مرحباً بك</span>
                    </div>
                </header>

                <!-- SPA Content Area -->
                <main id="content-area" class="fade-in">
                    <!-- Dynamic content will be loaded here -->
                </main>
            </div>
        </div>
    </div>

    <!-- Auth / Initial Loading Screen -->
    <div id="loading-screen" class="vh-100 d-flex justify-content-center align-items-center bg-light">
        <div class="text-center">
            <div class="spinner-border text-primary" style="width: 3rem; height: 3rem;" role="status">
                <span class="visually-hidden">جاري التحميل...</span>
            </div>
            <h4 class="mt-3 text-primary">نظام إدارة المحاماة</h4>
            <p class="text-muted" id="loading-text">جاري التحقق من الهوية...</p>
        </div>
    </div>

    <!-- Firebase Import Map -->
    <script type="importmap">
        {
            "imports": {
                "firebase/app": "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js",
                "firebase/auth": "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js",
                "firebase/firestore": "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js",
                "firebase/analytics": "https://www.gstatic.com/firebasejs/10.8.0/firebase-analytics.js"
            }
        }
    </script>

    <!-- UI Core Logic -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11.7.5/dist/sweetalert2.all.min.js"></script>
    <!-- PDF Generation Libraries -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.28/jspdf.plugin.autotable.min.js"></script>

    <script type="module">
        import { setupAuthListener, logout } from './js/auth.js';
        import { initRouter, navigateTo } from './js/router.js';
        import { initApp } from './js/app.js';
        import { startGlobalListeners } from './js/db-services.js';

        // Sidebar Toggle Logic
        const toggleSidebar = () => {
            document.getElementById('sidebar').classList.toggle('active');
            document.getElementById('sidebarOverlay').classList.toggle('active');
        };
        document.getElementById('sidebarCollapse').addEventListener('click', toggleSidebar);
        document.getElementById('sidebarOverlay').addEventListener('click', toggleSidebar);

        document.getElementById('btnLogout').addEventListener('click', (e) => {
            e.preventDefault();
            logout();
        });

        // Initialize App shell
        initApp(async (user, userData) => {
            if (user) {
                document.getElementById('lawyerNameShell').innerText = userData?.lawyerName || user.email;

                // Show App Shell, Hide Loading
                document.getElementById('loading-screen').style.display = 'none';
                document.getElementById('app-shell').style.display = 'block';

                // Start Persistent Listeners
                startGlobalListeners();

                // Initialize Router
                initRouter();
            } else {
                // If not logged in, redirect to login page (which is still a separate MPA page for now or we can make it part of SPA too)
                window.location.replace('pages/login.html');
            }
        });
    </script>
</body>

</html>
