<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>الموكلين | نظام إدارة المحاماة</title>
    <!-- Bootstrap 5 RTL CSS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.rtl.min.css">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- SweetAlert2 -->
    <link href="https://cdn.jsdelivr.net/npm/sweetalert2@11.7.5/dist/sweetalert2.min.css" rel="stylesheet">
    <!-- Custom CSS -->
  <script type="module" crossorigin src="/assets/clients-4ACDtafW.js"></script>
  <link rel="modulepreload" crossorigin href="/assets/auth-D1Y-1cw6.js">
  <link rel="modulepreload" crossorigin href="/assets/db-services-Ds2mt6SM.js">
  <link rel="modulepreload" crossorigin href="/assets/ui-utils-rfZbPk50.js">
  <link rel="stylesheet" crossorigin href="/assets/auth-B_BwaTaa.css">
</head>

<body>
    <div class="wrapper d-flex">
        <!-- Sidebar -->
        <nav id="sidebar">
            <div class="sidebar-header d-flex align-items-center justify-content-between">
                <h4 class="mb-0">مكتب المحاماة</h4>
                <button type="button" id="sidebarCollapse" class="btn btn-link text-white d-md-none">
                    <i class="fas fa-bars"></i>
                </button>
            </div>

            <ul class="list-unstyled components">
                <li>
                    <a href="dashboard.html">
                        <i class="fas fa-home"></i> الرئيسية
                    </a>
                </li>
                <li class="active">
                    <a href="clients.html">
                        <i class="fas fa-users"></i> الموكلين
                    </a>
                </li>
                <li>
                    <a href="cases.html">
                        <i class="fas fa-gavel"></i> القضايا
                    </a>
                </li>
                <li>
                    <a href="#" id="btnLogout">
                        <i class="fas fa-sign-out-alt"></i> تسجيل الخروج
                    </a>
                </li>
            </ul>
        </nav>

        <!-- Page Content -->
        <div id="content" class="w-100 p-4">
            <header class="d-flex justify-content-between align-items-center mb-4">
                <h2 id="sectionTitle">الموكلين</h2>
                <div id="userInfo" class="text-muted">
                    <span id="lawyerName">مرحباً بك</span>
                </div>
            </header>

            <!-- Clients Section -->
            <div id="clientsSection">
                <div class="d-flex justify-content-between mb-3">
                    <input type="text" id="clientSearch" class="form-control w-50" placeholder="بحث عن موكل...">
                    <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#addClientModal">
                        <i class="fas fa-plus"></i> إضافة موكل جديد
                    </button>
                </div>
                <div class="card shadow">
                    <div class="table-responsive">
                        <table class="table table-hover mb-0">
                            <thead>
                                <tr>
                                    <th>كود الموكل</th>
                                    <th>الاسم</th>
                                    <th>الرقم القومي</th>
                                    <th>رقم الهاتف</th>
                                    <th>الإجراءات</th>
                                </tr>
                            </thead>
                            <tbody id="clientsTableBody">
                                <!-- Data will be loaded here -->
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Add Client Modal -->
    <div class="modal fade" id="addClientModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">إضافة موكل جديد</h5>
                    <button type="button" class="btn-close ms-0 me-auto" data-bs-dismiss="modal"
                        aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <form id="addClientForm">
                        <div class="mb-3">
                            <label class="form-label">اسم الموكل</label>
                            <input type="text" class="form-control" name="name" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">الرقم القومي</label>
                            <input type="text" class="form-control" name="nationalId">
                        </div>
                        <div class="mb-3">
                            <label class="form-label">رقم الهاتف</label>
                            <input type="text" class="form-control" name="mobile">
                        </div>
                        <div class="mb-3">
                            <label class="form-label">العنوان</label>
                            <textarea class="form-control" name="address"></textarea>
                        </div>
                        <button type="submit" class="btn btn-primary w-100">حفظ</button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <!-- Bootstrap Bundle with Popper -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <!-- SweetAlert2 -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11.7.5/dist/sweetalert2.all.min.js"></script>

    <!-- App Logic -->

    <!-- Edit Client Modal -->
    <div class="modal fade" id="editClientModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">تعديل بيانات الموكل</h5>
                    <button type="button" class="btn-close ms-0 me-auto" data-bs-dismiss="modal"
                        aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <form id="editClientForm">
                        <input type="hidden" id="editClientId">
                        <div class="mb-3">
                            <label class="form-label">اسم الموكل</label>
                            <input type="text" class="form-control" id="editClientName" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">الرقم القومي</label>
                            <input type="text" class="form-control" id="editClientNationalId" minlength="14"
                                maxlength="14" pattern="\\d{14}" title="يجب أن يتكون الرقم القومي من 14 رقماً">
                        </div>
                        <div class="mb-3">
                            <label class="form-label">رقم الهاتف</label>
                            <input type="text" class="form-control" id="editClientMobile">
                        </div>
                        <div class="mb-3">
                            <label class="form-label">العنوان</label>
                            <textarea class="form-control" id="editClientAddress"></textarea>
                        </div>
                        <button type="submit" class="btn btn-primary w-100">حفظ التعديلات</button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</body>

</html>
