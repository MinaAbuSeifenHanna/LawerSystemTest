<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسجيل الدخول | نظام إدارة المحاماة</title>

    <!-- Bootstrap 5 RTL CSS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.rtl.min.css">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- SweetAlert2 -->
    <link href="https://cdn.jsdelivr.net/npm/sweetalert2@11.7.5/dist/sweetalert2.min.css" rel="stylesheet">
    <!-- Custom CSS -->
  <script type="module" crossorigin src="/assets/login-cTco09sh.js"></script>
  <link rel="modulepreload" crossorigin href="/assets/auth-D1Y-1cw6.js">
  <link rel="modulepreload" crossorigin href="/assets/ui-utils-rfZbPk50.js">
  <link rel="stylesheet" crossorigin href="/assets/auth-B_BwaTaa.css">
</head>

<body class="bg-light d-flex justify-content-center align-items-center vh-100">
    <div id="authOverlay" class="w-100 h-100 d-flex justify-content-center align-items-center" style="z-index: 2000;">
        <div class="card p-4 shadow-lg" style="width: 400px; max-width: 90%;">
            <h3 class="text-center mb-4 text-primary">مكتب المحاماة</h3>
            <ul class="nav nav-tabs mb-3" id="authTab" role="tablist">
                <li class="nav-item" role="presentation">
                    <button class="nav-link active" id="login-tab" data-bs-toggle="tab" data-bs-target="#loginPane"
                        type="button" role="tab">تسجيل الدخول</button>
                </li>
                <li class="nav-item" role="presentation">
                    <button class="nav-link" id="register-tab" data-bs-toggle="tab" data-bs-target="#registerPane"
                        type="button" role="tab">إنشاء حساب</button>
                </li>
            </ul>
            <div class="tab-content" id="authTabContent">
                <div class="tab-pane fade show active" id="loginPane" role="tabpanel">
                    <form id="loginForm">
                        <div class="mb-3">
                            <label class="form-label">البريد الإلكتروني</label>
                            <input type="email" class="form-control" name="email" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">كلمة المرور</label>
                            <input type="password" class="form-control" name="password" required>
                        </div>
                        <div class="d-flex justify-content-between mb-3">
                            <div class="form-check">
                                <input class="form-check-input" type="checkbox" id="rememberMe">
                                <label class="form-check-label" for="rememberMe">تذكرني</label>
                            </div>
                            <a href="#" class="text-decoration-none text-muted small">نسيت كلمة المرور؟</a>
                        </div>
                        <button type="submit" class="btn btn-primary w-100 mb-2">دخول</button>
                    </form>
                </div>
                <div class="tab-pane fade" id="registerPane" role="tabpanel">
                    <form id="registerForm">
                        <div class="mb-3">
                            <label class="form-label">اسم المحامي/المكتب</label>
                            <input type="text" class="form-control" name="lawyerName" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">البريد الإلكتروني</label>
                            <input type="email" class="form-control" name="email" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">كلمة المرور</label>
                            <input type="password" class="form-control" name="password" minlength="6" required>
                        </div>
                        <button type="submit" class="btn btn-primary w-100 mb-2">إنشاء حساب</button>
                    </form>
                </div>
            </div>
        </div>
    </div>


    <!-- Bootstrap Bundle with Popper -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <!-- SweetAlert2 -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11.7.5/dist/sweetalert2.all.min.js"></script>

    <!-- App Logic -->
</body>

</html>
